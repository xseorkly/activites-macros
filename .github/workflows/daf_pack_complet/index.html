<style>
:root {

* { box-sizing:border-box; }
body { margin:0; font-family:Inter,Segoe UI,Arial,sans-serif; background:linear-gradient(180deg,#0b1020,#0f1730); color:var(--text); }

header { padding:28px 24px 18px; border-bottom:1px solid rgba(255,255,255,.08); position:sticky; top:0; backdrop-filter: blur(12px); background:rgba(11,16,32,.86); z-index:10; }
.wrap { max-width:1400px; margin:0 auto; }
.hero { display:flex; flex-wrap:wrap; gap:18px; align-items:flex-end; justify-content:space-between; }
h1 { margin:0; font-size:34px; }
.sub { color:var(--muted); margin-top:8px; max-width:900px; line-height:1.5; }
.controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
input, select { background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
main { display:grid; grid-template-columns:320px 1fr; gap:18px; max-width:1400px; margin:18px auto; padding:0 24px 32px; }
aside, section.panel { background:rgba(18,25,56,.9); border:1px solid rgba(255,255,255,.08); border-radius:18px; box-shadow:0 8px 24px rgba(0,0,0,.18); }
aside { padding:16px; height:calc(100vh - 140px); position:sticky; top:120px; overflow:auto; }
section.panel { padding:20px; }
.navbtn { display:block; width:100%; text-align:left; border:1px solid transparent; background:transparent; color:var(--text); padding:12px 12px; border-radius:12px; cursor:pointer; margin-bottom:8px; }
.navbtn:hover, .navbtn.active { background:var(--chip); border-color:var(--border); }
.muted { color:var(--muted); }
.grid { display:grid; gap:14px; }
.cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:14px; }
.card { background:var(--panel2); border:1px solid rgba(255,255,255,.07); border-radius:16px; padding:16px; }
.kpis { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin:16px 0 22px; }
.kpi { background:linear-gradient(180deg,#182248,#141c3f); border:1px solid var(--border); border-radius:16px; padding:16px; }
.kpi .n { font-size:26px; font-weight:700; margin-top:4px; }
.chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
.chip { background:var(--chip); color:#dbe8ff; padding:6px 10px; border-radius:999px; font-size:12px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; margin-top:10px; font-size:14px; }
th, td { border-bottom:1px solid rgba(255,255,255,.08); padding:8px 10px; text-align:left; vertical-align:top; }
th { color:#dbe8ff; font-weight:700; background:rgba(255,255,255,.03); position:sticky; top:0; }
.tblwrap { overflow:auto; border:1px solid rgba(255,255,255,.08); border-radius:14px; max-height:340px; }
pre { white-space:pre-wrap; background:#0a1129; padding:14px; border-radius:14px; border:1px solid rgba(255,255,255,.08); overflow:auto; max-height:480px; }
.links { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
.linkbtn { display:inline-flex; align-items:center; gap:8px; background:#1f3167; border:1px solid var(--border); padding:10px 14px; border-radius:12px; }
.two { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.small { font-size:13px; }
@media (max-width: 980px) {
  main { grid-template-columns:1fr; }
  aside { position:relative; top:0; height:auto; }
  .kpis { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .two { grid-template-columns:1fr; }
}
</style>
</head>

21800]]}]}], "macros": [{"file": "01_Consolidation_MultiFichiers.bas", "module": "modConsolidation", "code": "Attribute VB_Name = \"modConsolidation\"\nOption Explicit\n\nSub ConsoliderFiliales()\n    Dim wsDest As Worksheet\n    Dim wbSource As Workbook\n    Dim wsSource As Worksheet\n    Dim dossier As String\n    Dim fichier As String\n    Dim lastRowDest As Long\n    Dim lastRowSrc As Long\n    Dim i As Long\n\n    Application.ScreenUpdating = False\n    Application.DisplayAlerts = False\n\n    Set wsDest = ThisWorkbook.Worksheets(\"Consolidation\")\n    wsDest.Rows(\"2:\" & wsDest.Rows.Count).ClearContents\n\n    dossier = ThisWorkbook.Path & Application.PathSeparator\n    fichier = Dir(dossier & \"*.xlsx\")\n\n    Do While fichier <> \"\"\n        If fichier <> ThisWorkbook.Name And InStr(1, fichier, \"Filiale_\", vbTextCompare) > 0 Then\n            Set wbSource = Workbooks.Open(dossier & fichier, ReadOnly:=True)\n            Set wsSource = wbSource.Worksheets(1)\n\n            lastRowSrc = wsSource.Cells(wsSource.Rows.Count, \"A\").End(xlUp).Row\n            If lastRowSrc >= 2 Then\n                For i = 2 To lastRowSrc\n                    If Application.WorksheetFunction.CountA(wsSource.Rows(i)) > 0 Then\n                        lastRowDest = wsDest.Cells(wsDest.Rows.Count, \"A\").End(xlUp).Row + 1\n                        wsDest.Cells(lastRowDest, 1).Value = wsSource.Cells(i, 1).Value\n                        wsDest.Cells(lastRowDest, 2).Value = wsSource.Cells(i, 2).Value\n                        wsDest.Cells(lastRowDest, 3).Value = wsSource.Cells(i, 3).Value\n                        wsDest.Cells(lastRowDest, 4).Value = wsSource.Cells(i, 4).Value\n                        wsDest.Cells(lastRowDest, 5).Value = wsSource.Cells(i, 5).Value\n                        wsDest.Cells(lastRowDest, 6).Value = Replace(Replace(fichier, \".xlsx\", \"\"), \".xlsm\", \"\")\n                    End If\n                Next i\n            End If\n\n            wbSource.Close SaveChanges:=False\n        End If\n        fichier = Dir\n    Loop\n\n    lastRowDest = wsDest.Cells(wsDest.Rows.Count, \"A\").End(xlUp).Row\n    If lastRowDest >= 2 Then\n        wsDest.Range(\"A1:F\" & lastRowDest).RemoveDuplicates Columns:=Array(1, 2, 3, 4, 5, 6), Header:=xlYes\n        wsDest.Range(\"A1:F\" & lastRowDest).Sort Key1:=wsDest.Range(\"A2\"), Order1:=xlAscending, Header:=xlYes\n        wsDest.Columns(\"A:F\").AutoFit\n    End If\n\n    Application.ScreenUpdating = True\n    Application.DisplayAlerts = True\n\n    MsgBox \"Consolidation terminée.\", vbInformation\nEnd Sub"}, {"file": "02_Detection_Anomalies.bas", "module": "modAnomalies", "code": "Attribute VB_Name = \"modAnomalies\"\nOption Explicit\n\nSub DetecterAnomalies()\n    Dim ws As Worksheet, wsOut As Worksheet\n    Dim lastRow As Long, outRow As Long, i As Long\n    Dim cle As String\n    Dim d As Object\n\n    Set ws = ThisWorkbook.Worksheets(\"Ecritures\")\n    On Error Resume Next\n    Set wsOut = ThisWorkbook.Worksheets(\"Anomalies\")\n    On Error GoTo 0\n\n    If wsOut Is Nothing Then\n        Set wsOut = ThisWorkbook.Worksheets.Add(After:=ws)\n        wsOut.Name = \"Anomalies\"\n    Else\n        wsOut.Cells.Clear\n    End If\n\n    wsOut.Range(\"A1:F1\").Value = Array(\"Ligne source\", \"Type anomalie\", \"Date\", \"Compte\", \"NumPiece\", \"Montant (€)\")\n    outRow = 2\n    lastRow = ws.Cells(ws.Rows.Count, \"A\").End(xlUp).Row\n    Set d = CreateObject(\"Scripting.Dictionary\")\n\n    For i = 2 To lastRow\n        cle = CStr(ws.Cells(i, 1).Value) & \"|\" & CStr(ws.Cells(i, 3).Value) & \"|\" & CStr(ws.Cells(i, 5).Value) & \"|\" & CStr(ws.Cells(i, 6).Value)\n\n        If d.Exists(cle) Then\n            AjouterAnomalie ws, wsOut, outRow, i, \"Doublon détecté\"\n        Else\n            d.Add cle, i\n        End If\n\n        If ws.Cells(i, 5).Value = \"\" Then\n            AjouterAnomalie ws, wsOut, outRow, i, \"Numéro de pièce manquant\"\n        End If\n\n        If Abs(CDbl(Nz(ws.Cells(i, 6).Value))) >= 50000 Then\n            AjouterAnomalie ws, wsOut, outRow, i, \"Montant élevé à contrôler\"\n        End If\n\n        If ws.Cells(i, 2).Value = \"ACH\" And CDbl(Nz(ws.Cells(i, 6).Value)) < 0 Then\n            AjouterAnomalie ws, wsOut, outRow, i, \"Charge d'achat négative\"\n        End If\n    Next i\n\n    wsOut.Columns.AutoFit\n    MsgBox \"Contrôle terminé. Consultez l'onglet Anomalies.\", vbInformation\nEnd Sub\n\nPrivate Sub AjouterAnomalie(ws As Worksheet, wsOut As Worksheet, ByRef outRow As Long, ByVal i As Long, ByVal motif As String)\n    wsOut.Cells(outRow, 1).Value = i\n    wsOut.Cells(outRow, 2).Value = motif\n    wsOut.Cells(outRow, 3).Value = ws.Cells(i, 1).Value\n    wsOut.Cells(outRow, 4).Value = ws.Cells(i, 3).Value\n    wsOut.Cells(outRow, 5).Value = ws.Cells(i, 5).Value\n    wsOut.Cells(outRow, 6).Value = ws.Cells(i, 6).Value\n    outRow = outRow + 1\nEnd Sub\n\nPrivate Function Nz(valeur As Variant) As Double\n    If IsNumeric(valeur) Then\n        Nz = CDbl(valeur)\n    Else\n        Nz = 0\n    End If\nEnd Function"}, {"file": "03_Suivi_Tresorerie.bas", "module": "modTresorerie", "code": "Attribute VB_Name = \"modTresorerie\"\nOption Explicit\n\nSub CalculerTresorerie()\n    Dim wsFlux As Worksheet, wsParam As Worksheet\n    Dim lastRow As Long, i As Long\n    Dim solde As Double, seuil As Double\n    Dim ch As ChartObject\n\n    Set wsFlux = ThisWorkbook.Worksheets(\"Flux_Journaliers\")\n    Set wsParam = ThisWorkbook.Worksheets(\"Parametres\")\n\n    solde = wsParam.Range(\"B2\").Value\n    seuil = wsParam.Range(\"B3\").Value\n    lastRow = wsFlux.Cells(wsFlux.Rows.Count, \"A\").End(xlUp).Row\n\n    wsFlux.Range(\"E1:F1\").Value = Array(\"Solde quotidien (€)\", \"Alerte\")\n    wsFlux.Range(\"E2:F\" & wsFlux.Rows.Count).ClearContents\n    wsFlux.Range(\"A2:F\" & lastRow).Interior.Pattern = xlNone\n\n    For i = 2 To lastRow\n        solde = solde + Nz(wsFlux.Cells(i, 2).Value) - Nz(wsFlux.Cells(i, 3).Value)\n        wsFlux.Cells(i, 5).Value = solde\n\n        If solde < seuil Then\n            wsFlux.Cells(i, 6).Value = \"Alerte\"\n            wsFlux.Range(\"A\" & i & \":F\" & i).Interior.Color = RGB(255, 235, 235)\n        Else\n            wsFlux.Cells(i, 6).Value = \"OK\"\n        End If\n    Next i\n\n    For Each ch In wsFlux.ChartObjects\n        ch.Delete\n    Next ch\n\n    Set ch = wsFlux.ChartObjects.Add(Left:=450, Top:=20, Width:=460, Height:=260)\n    ch.Chart.ChartType = xlLineMarkers\n    ch.Chart.SetSourceData Source:=wsFlux.Range(\"A1:E\" & lastRow)\n    ch.Chart.SeriesCollection(1).Delete\n    ch.Chart.SeriesCollection(1).Delete\n    ch.Chart.SeriesCollection(1).Delete\n    ch.Chart.HasTitle = True\n    ch.Chart.ChartTitle.Text = \"Évolution du solde quotidien\"\n\n    wsFlux.Columns(\"A:F\").AutoFit\n    MsgBox \"Calcul et graphique de trésorerie terminés.\", vbInformation\nEnd Sub\n\nPrivate Function Nz(valeur As Variant) As Double\n    If IsNumeric(valeur) Then\n        Nz = CDbl(valeur)\n    Else\n        Nz = 0\n    End If\nEnd Function"}, {"file": "04_Reporting_Mensuel.bas", "module": "modReportingMensuel", "code": "Attribute VB_Name = \"modReportingMensuel\"\nOption Explicit\n\nSub GenererReportingMensuel()\n    Dim wsData As Worksheet, wsRep As Worksheet\n    Dim lastRow As Long, i As Long\n    Dim totalCA As Double, totalCV As Double, totalCF As Double\n    Dim ebitda As Double, marge As Double, budgetCA As Double, budgetEBITDA As Double\n    Dim ch As ChartObject\n\n    Set wsData = ThisWorkbook.Worksheets(\"P&L_Mensuel\")\n    On Error Resume Next\n    Set wsRep = ThisWorkbook.Worksheets(\"Reporting\")\n    On Error GoTo 0\n\n    If wsRep Is Nothing Then\n        Set wsRep = ThisWorkbook.Worksheets.Add(After:=wsData)\n        wsRep.Name = \"Reporting\"\n    Else\n        wsRep.Cells.Clear\n    End If\n\n    lastRow = wsData.Cells(wsData.Rows.Count, \"A\").End(xlUp).Row\n\n    For i = 2 To lastRow\n        totalCA = totalCA + wsData.Cells(i, 2).Value\n        totalCV = totalCV + wsData.Cells(i, 3).Value\n        totalCF = totalCF + wsData.Cells(i, 4).Value\n        budgetCA = budgetCA + wsData.Cells(i, 5).Value\n        budgetEBITDA = budgetEBITDA + wsData.Cells(i, 6).Value\n    Next i\n\n    marge = totalCA - totalCV\n    ebitda = marge - totalCF\n\n    wsRep.Range(\"A1:B8\").Value = _\n        Array( _\n        Array(\"Indicateur\", \"Valeur\"), _\n        Array(\"CA total (€)\", totalCA), _\n        Array(\"Coûts variables (€)\", totalCV), _\n        Array(\"Marge brute (€)\", marge), _\n        Array(\"Charges fixes (€)\", totalCF), _\n        Array(\"EBITDA (€)\", ebitda), _\n        Array(\"Écart CA vs budget (€)\", totalCA - budgetCA), _\n        Array(\"Écart EBITDA vs budget (€)\", ebitda - budgetEBITDA))\n\n    wsRep.Range(\"D1:F\" & lastRow).ClearContents\n    wsRep.Range(\"D1:F1\").Value = Array(\"Mois\", \"CA réel\", \"EBITDA\")\n    For i = 2 To lastRow\n        wsRep.Cells(i, 4).Value = wsData.Cells(i, 1).Value\n        wsRep.Cells(i, 5).Value = wsData.Cells(i, 2).Value\n        wsRep.Cells(i, 6).Value = wsData.Cells(i, 2).Value - wsData.Cells(i, 3).Value - wsData.Cells(i, 4).Value\n    Next i\n\n    For Each ch In wsRep.ChartObjects\n        ch.Delete\n    Next ch\n    Set ch = wsRep.ChartObjects.Add(Left:=320, Top:=20, Width:=470, Height:=260)\n    ch.Chart.ChartType = xlColumnClustered\n    ch.Chart.SetSourceData wsRep.Range(\"D1:F\" & lastRow)\n    ch.Chart.HasTitle = True\n    ch.Chart.ChartTitle.Text = \"CA et EBITDA mensuels\"\n\n    wsRep.Columns(\"A:F\").AutoFit\n    MsgBox \"Reporting mensuel généré.\", vbInformation\nEnd Sub"}, {"file": "05_Analyse_Depenses.bas", "module": "modDepenses", "code": "Attribute VB_Name = \"modDepenses\"\nOption Explicit\n\nSub AnalyserDepenses()\n    Dim ws As Worksheet, wsOut As Worksheet\n    Dim lastRow As Long, outRow As Long, i As Long\n    Dim d As Object, k As Variant\n\n    Set ws = ThisWorkbook.Worksheets(\"Depenses\")\n    On Error Resume Next\n    Set wsOut = ThisWorkbook.Worksheets(\"Synthese_Depenses\")\n    On Error GoTo 0\n\n    If wsOut Is Nothing Then\n        Set wsOut = ThisWorkbook.Worksheets.Add(After:=ws)\n        wsOut.Name = \"Synthese_Depenses\"\n    Else\n        wsOut.Cells.Clear\n    End If\n\n    Set d = CreateObject(\"Scripting.Dictionary\")\n    lastRow = ws.Cells(ws.Rows.Count, \"A\").End(xlUp).Row\n\n    For i = 2 To lastRow\n        If d.Exists(CStr(ws.Cells(i, 3).Value)) Then\n            d(CStr(ws.Cells(i, 3).Value)) = d(CStr(ws.Cells(i, 3).Value)) + CDbl(ws.Cells(i, 5).Value)\n        Else\n            d.Add CStr(ws.Cells(i, 3).Value), CDbl(ws.Cells(i, 5).Value)\n        End If\n    Next i\n\n    wsOut.Range(\"A1:B1\").Value = Array(\"Catégorie\", \"Total HT (€)\")\n    outRow = 2\n    For Each k In d.Keys\n        wsOut.Cells(outRow, 1).Value = k\n        wsOut.Cells(outRow, 2).Value = d(k)\n        outRow = outRow + 1\n    Next k\n\n    wsOut.Range(\"D1:E4\").Value = Array( _\n        Array(\"Top 3 postes\", \"Montant\"), _\n        Array(\"\", \"\"), _\n        Array(\"\", \"\"), _\n        Array(\"\", \"\"))\n\n    wsOut.Range(\"A1:B\" & outRow - 1).Sort Key1:=wsOut.Range(\"B2\"), Order1:=xlDescending, Header:=xlYes\n    wsOut.Range(\"D2:E4\").Value = wsOut.Range(\"A2:B4\").Value\n    wsOut.Columns.AutoFit\n\n    MsgBox \"Synthèse des dépenses générée.\", vbInformation\nEnd Sub"}, {"file": "06_Factures_Impayees.bas", "module": "modImpayes", "code": "Attribute VB_Name = \"modImpayes\"\nOption Explicit\n\nSub SuivreImpayes()\n    Dim ws As Worksheet\n    Dim lastRow As Long, i As Long\n    Dim dateRef As Date, retard As Long\n\n    Set ws = ThisWorkbook.Worksheets(\"Suivi_Factures\")\n    lastRow = ws.Cells(ws.Rows.Count, \"A\").End(xlUp).Row\n    dateRef = Date\n\n    ws.Range(\"I1:J1\").Value = Array(\"Retard (jours)\", \"Priorité\")\n    ws.Range(\"A2:J\" & lastRow).Interior.Pattern = xlNone\n\n    For i = 2 To lastRow\n        If ws.Cells(i, 6).Value = \"Impayée\" Then\n            retard = DateDiff(\"d\", ws.Cells(i, 4).Value, dateRef)\n            If retard < 0 Then retard = 0\n            ws.Cells(i, 9).Value = retard\n\n            If retard > 30 Then\n                ws.Cells(i, 10).Value = \"Relance urgente\"\n                ws.Range(\"A\" & i & \":J\" & i).Interior.Color = RGB(255, 230, 230)\n            ElseIf retard > 0 Then\n                ws.Cells(i, 10).Value = \"Relance\"\n                ws.Range(\"A\" & i & \":J\" & i).Interior.Color = RGB(255, 245, 204)\n            Else\n                ws.Cells(i, 10).Value = \"À venir\"\n            End If\n        Else\n            ws.Cells(i, 9).Value = 0\n            ws.Cells(i, 10).Value = \"Soldée\"\n        End If\n    Next i\n\n    ws.Columns.AutoFit\n    MsgBox \"Suivi des impayés mis à jour.\", vbInformation\nEnd Sub"}, {"file": "07_Simulation_Budgetaire.bas", "module": "modSimulationBudget", "code": "Attribute VB_Name = \"modSimulationBudget\"\nOption Explicit\n\nSub SimulerScenarios()\n    Dim ws As Worksheet, wsOut As Worksheet\n    Dim volume As Double, prix As Double, cvu As Double\n    Dim chargesFixes As Double\n    Dim scenarios, i As Long\n    Dim facteurVol As Double, facteurPrix As Double\n\n    Set ws = ThisWorkbook.Worksheets(\"Hypotheses\")\n    On Error Resume Next\n    Set wsOut = ThisWorkbook.Worksheets(\"Scenarios\")\n    On Error GoTo 0\n\n    If wsOut Is Nothing Then\n        Set wsOut = ThisWorkbook.Worksheets.Add(After:=ws)\n        wsOut.Name = \"Scenarios\"\n    Else\n        wsOut.Cells.Clear\n    End If\n\n    volume = ws.Range(\"B2\").Value\n    prix = ws.Range(\"B3\").Value\n    cvu = ws.Range(\"B4\").Value\n    chargesFixes = Application.WorksheetFunction.Sum(ws.Range(\"B5:B8\"))\n\n    scenarios = Array(\"Prudent\", \"Central\", \"Optimiste\")\n\n    wsOut.Range(\"A1:E1\").Value = Array(\"Scénario\", \"CA (€)\", \"Marge brute (€)\", \"Charges fixes (€)\", \"Résultat (€)\")\n\n    For i = 0 To 2\n        Select Case scenarios(i)\n            Case \"Prudent\": facteurVol = 0.92: facteurPrix = 0.98\n            Case \"Central\": facteurVol = 1: facteurPrix = 1\n            Case \"Optimiste\": facteurVol = 1.08: facteurPrix = 1.03\n        End Select\n\n        wsOut.Cells(i + 2, 1).Value = scenarios(i)\n        wsOut.Cells(i + 2, 2).Value = volume * facteurVol * prix * facteurPrix\n        wsOut.Cells(i + 2, 3).Value = volume * facteurVol * (prix * facteurPrix - cvu)\n        wsOut.Cells(i + 2, 4).Value = chargesFixes\n        wsOut.Cells(i + 2, 5).Value = wsOut.Cells(i + 2, 3).Value - chargesFixes\n    Next i\n\n    wsOut.Columns.AutoFit\n    MsgBox \"Scénarios budgétaires calculés.\", vbInformation\nEnd Sub"}, {"file": "08_Rentabilite_Produits.bas", "module": "modRentabilite", "code": "Attribute VB_Name = \"modRentabilite\"\nOption Explicit\n\nSub AnalyserRentabilite()\n    Dim ws As Worksheet\n    Dim lastRow As Long, i As Long\n    Dim margeUnitaire As Double, caNet As Double, margeTotale As Double\n\n    Set ws = ThisWorkbook.Worksheets(\"Produits\")\n    lastRow = ws.Cells(ws.Rows.Count, \"A\").End(xlUp).Row\n\n    ws.Range(\"H1:K1\").Value = Array(\"CA net (€)\", \"Marge unitaire (€)\", \"Marge totale (€)\", \"Diagnostic\")\n    ws.Range(\"A2:K\" & lastRow).Interior.Pattern = xlNone\n\n    For i = 2 To lastRow\n        caNet = ws.Cells(i, 3).Value * ws.Cells(i, 4).Value * (1 - ws.Cells(i, 7).Value)\n        margeUnitaire = ws.Cells(i, 4).Value - ws.Cells(i, 5).Value\n        margeTotale = (ws.Cells(i, 3).Value * margeUnitaire * (1 - ws.Cells(i, 7).Value)) - ws.Cells(i, 6).Value\n\n        ws.Cells(i, 8).Value = caNet\n        ws.Cells(i, 9).Value = margeUnitaire\n        ws.Cells(i, 10).Value = margeTotale\n\n        If margeTotale < 0 Then\n            ws.Cells(i, 11).Value = \"Destructeur de valeur\"\n            ws.Range(\"A\" & i & \":K\" & i).Interior.Color = RGB(255, 230, 230)\n        ElseIf margeTotale < 25000 Then\n            ws.Cells(i, 11).Value = \"Sous surveillance\"\n            ws.Range(\"A\" & i & \":K\" & i).Interior.Color = RGB(255, 245, 204)\n        Else\n            ws.Cells(i, 11).Value = \"Rentable\"\n            ws.Range(\"A\" & i & \":K\" & i).Interior.Color = RGB(230, 255, 230)\n        End If\n    Next i\n\n    ws.Columns.AutoFit\n    MsgBox \"Analyse de rentabilité terminée.\", vbInformation\nEnd Sub"}, {"file": "09_Previsions_CA.bas", "module": "modPrevisions", "code": "Attribute VB_Name = \"modPrevisions\"\nOption Explicit\n\nSub PrevoirCA6Mois()\n    Dim ws As Worksheet\n    Dim lastRow As Long, i As Long\n    Dim pente As Double, moyenneInc As Double\n    Dim dernierCA As Double, prochaineDate As Date\n\n    Set ws = ThisWorkbook.Worksheets(\"Historique_CA\")\n    lastRow = ws.Cells(ws.Rows.Count, \"A\").End(xlUp).Row\n\n    ws.Range(\"F1:G1\").Value = Array(\"Mois prévision\", \"CA prévisionnel (€)\")\n\n    moyenneInc = (ws.Cells(lastRow, 2).Value - ws.Cells(2, 2).Value) / (lastRow - 2)\n    dernierCA = ws.Cells(lastRow, 2).Value\n    prochaineDate = DateSerial(Year(ws.Cells(lastRow, 1).Value), Month(ws.Cells(lastRow, 1).Value) + 1, 1)\n\n    For i = 1 To 6\n        ws.Cells(i + 1, 6).Value = prochaineDate\n        ws.Cells(i + 1, 7).Value = dernierCA + moyenneInc * i\n        prochaineDate = DateSerial(Year(prochaineDate), Month(prochaineDate) + 1, 1)\n    Next i\n\n    ws.Columns.AutoFit\n    MsgBox \"Prévisions à 6 mois générées.\", vbInformation\nEnd Sub"}, {"file": "10_Audit_Donnees.bas", "module": "modAuditDonnees", "code": "Attribute VB_Name = \"modAuditDonnees\"\nOption Explicit\n\nSub AuditerBaseClients()\n    Dim ws As Worksheet, wsOut As Worksheet\n    Dim lastRow As Long, outRow As Long, i As Long\n    Dim d As Object\n\n    Set ws = ThisWorkbook.Worksheets(\"Base_Clients\")\n    On Error Resume Next\n    Set wsOut = ThisWorkbook.Worksheets(\"Audit\")\n    On Error GoTo 0\n\n    If wsOut Is Nothing Then\n        Set wsOut = ThisWorkbook.Worksheets.Add(After:=ws)\n        wsOut.Name = \"Audit\"\n    Else\n        wsOut.Cells.Clear\n    End If\n\n    wsOut.Range(\"A1:D1\").Value = Array(\"Ligne\", \"Anomalie\", \"Client\", \"Détail\")\n    outRow = 2\n    lastRow = ws.Cells(ws.Rows.Count, \"A\").End(xlUp).Row\n    Set d = CreateObject(\"Scripting.Dictionary\")\n\n    For i = 2 To lastRow\n        If ws.Cells(i, 3).Value = \"\" Or InStr(1, ws.Cells(i, 3).Value, \"@\") = 0 Then\n            AuditLigne ws, wsOut, outRow, i, \"Email invalide\", ws.Cells(i, 3).Value\n        End If\n\n        If Len(CStr(ws.Cells(i, 4).Value)) <> 14 Then\n            AuditLigne ws, wsOut, outRow, i, \"SIRET invalide\", ws.Cells(i, 4).Value\n        End If\n\n        If CDbl(Nz(ws.Cells(i, 5).Value)) < 0 Then\n            AuditLigne ws, wsOut, outRow, i, \"Encours négatif\", ws.Cells(i, 5).Value\n        End If\n\n        If d.Exists(CStr(ws.Cells(i, 1).Value) & \"|\" & CStr(ws.Cells(i, 4).Value)) Then\n            AuditLigne ws, wsOut, outRow, i, \"Doublon client\", ws.Cells(i, 1).Value\n        Else\n            d.Add CStr(ws.Cells(i, 1).Value) & \"|\" & CStr(ws.Cells(i, 4).Value), i\n        End If\n    Next i\n\n    wsOut.Columns.AutoFit\n    MsgBox \"Audit terminé. Consultez l'onglet Audit.\", vbInformation\nEnd Sub\n\nPrivate Sub AuditLigne(ws As Worksheet, wsOut As Worksheet, ByRef outRow As Long, ByVal i As Long, ByVal anomalie As String, ByVal detail As Variant)\n    wsOut.Cells(outRow, 1).Value = i\n    wsOut.Cells(outRow, 2).Value = anomalie\n    wsOut.Cells(outRow, 3).Value = ws.Cells(i, 1).Value\n    wsOut.Cells(outRow, 4).Value = detail\n    outRow = outRow + 1\nEnd Sub\n\nPrivate Function Nz(valeur As Variant) As Double\n    If IsNumeric(valeur) Then\n        Nz = CDbl(valeur)\n    Else\n        Nz = 0\n    End If\nEnd Function"}, {"file": "11_Commentaires_Financiers.bas", "module": "modCommentaires", "code": "Attribute VB_Name = \"modCommentaires\"\nOption Explicit\n\nSub GenererCommentaires()\n    Dim ws As Worksheet\n    Dim lastRow As Long, i As Long\n    Dim commentaire As String\n\n    Set ws = ThisWorkbook.Worksheets(\"KPI_Mensuels\")\n    lastRow = ws.Cells(ws.Rows.Count, \"A\").End(xlUp).Row\n\n    ws.Range(\"H1\").Value = \"Commentaire automatique\"\n\n    For i = 2 To lastRow\n        commentaire = \"\"\n\n        If ws.Cells(i, 2).Value > ws.Cells(i - 1 + IIf(i = 2, 1, 0), 2).Value And i > 2 Then\n            commentaire = commentaire & \"CA en progression. \"\n        ElseIf i > 2 And ws.Cells(i, 2).Value < ws.Cells(i - 1, 2).Value Then\n            commentaire = commentaire & \"CA en retrait. \"\n        End If\n\n        If ws.Cells(i, 3).Value >= 0.6 Then\n            commentaire = commentaire & \"Marge brute solide. \"\n        ElseIf ws.Cells(i, 3).Value < 0.58 Then\n            commentaire = commentaire & \"Marge sous pression. \"\n        End If\n\n        If ws.Cells(i, 6).Value < 43000 Then\n            commentaire = commentaire & \"Niveau de trésorerie à surveiller. \"\n        End If\n\n        If ws.Cells(i, 7).Value > 47 Then\n            commentaire = commentaire & \"DSO élevé, renforcer les relances.\"\n        End If\n\n        If commentaire = \"\" Then commentaire = \"Situation stable sur le mois.\"\n        ws.Cells(i, 8).Value = Trim(commentaire)\n    Next i\n\n    ws.Columns.AutoFit\n    MsgBox \"Commentaires financiers générés.\", vbInformation\nEnd Sub"}, {"file": "12_Dashboard_DAF.bas", "module": "modDashboard", "code": "Attribute VB_Name = \"modDashboard\"\nOption Explicit\n\nSub ConstruireDashboard()\n    Dim wsKPI As Worksheet, wsBU As Worksheet, wsDash As Worksheet\n    Dim lastRow As Long, lastRowBU As Long\n    Dim ca As Double, marge As Double, ebitda As Double, cash As Double, dso As Double\n\n    Set wsKPI = ThisWorkbook.Worksheets(\"Donnees_KPI\")\n    Set wsBU = ThisWorkbook.Worksheets(\"Donnees_BU\")\n\n    On Error Resume Next\n    Set wsDash = ThisWorkbook.Worksheets(\"Dashboard\")\n    On Error GoTo 0\n\n    If wsDash Is Nothing Then\n        Set wsDash = ThisWorkbook.Worksheets.Add(Before:=wsKPI)\n        wsDash.Name = \"Dashboard\"\n    Else\n        wsDash.Cells.Clear\n    End If\n\n    lastRow = wsKPI.Cells(wsKPI.Rows.Count, \"A\").End(xlUp).Row\n    ca = wsKPI.Cells(lastRow, 2).Value\n    marge = wsKPI.Cells(lastRow, 2).Value - wsKPI.Cells(lastRow, 3).Value\n    ebitda = marge - wsKPI.Cells(lastRow, 4).Value\n    cash = wsKPI.Cells(lastRow, 5).Value\n    dso = wsKPI.Cells(lastRow, 6).Value\n\n    wsDash.Range(\"A1:B6\").Value = Array( _\n        Array(\"KPI\", \"Valeur\"), _\n        Array(\"CA dernier mois (€)\", ca), _\n        Array(\"Marge brute (€)\", marge), _\n        Array(\"EBITDA (€)\", ebitda), _\n        Array(\"Cash (€)\", cash), _\n        Array(\"DSO\", dso))\n\n    wsDash.Range(\"D1:F1\").Value = Array(\"BU\", \"CA total (€)\", \"Marge brute totale (€)\")\n    lastRowBU = wsBU.Cells(wsBU.Rows.Count, \"A\").End(xlUp).Row\n    GenererSyntheseBU wsBU, wsDash, lastRowBU\n\n    wsDash.Columns.AutoFit\n    MsgBox \"Dashboard généré.\", vbInformation\nEnd Sub\n\nPrivate Sub GenererSyntheseBU(wsBU As Worksheet, wsDash As Worksheet, lastRowBU As Long)\n    Dim dCA As Object, dMarge As Object, i As Long, k As Variant, outRow As Long\n    Set dCA = CreateObject(\"Scripting.Dictionary\")\n    Set dMarge = CreateObject(\"Scripting.Dictionary\")\n\n    For i = 2 To lastRowBU\n        If dCA.Exists(CStr(wsBU.Cells(i, 1).Value)) Then\n            dCA(CStr(wsBU.Cells(i, 1).Value)) = dCA(CStr(wsBU.Cells(i, 1).Value)) + wsBU.Cells(i, 3).Value\n            dMarge(CStr(wsBU.Cells(i, 1).Value)) = dMarge(CStr(wsBU.Cells(i, 1).Value)) + wsBU.Cells(i, 4).Value\n        Else\n            dCA.Add CStr(wsBU.Cells(i, 1).Value), wsBU.Cells(i, 3).Value\n            dMarge.Add CStr(wsBU.Cells(i, 1).Value), wsBU.Cells(i, 4).Value\n        End If\n    Next i\n\n    outRow = 2\n    For Each k In dCA.Keys\n        wsDash.Cells(outRow, 4).Value = k\n        wsDash.Cells(outRow, 5).Value = dCA(k)\n        wsDash.Cells(outRow, 6).Value = dMarge(k)\n        outRow = outRow + 1\n    Next k\nEnd Sub"}]};
const state = { view: 'overview', q: '' };

const byId = (id) => document.getElementById(id);
const fmt = (v) => {
  if (v === null || v === undefined) return '';
  if (typeof v === 'number') return Number.isInteger(v) ? v.toLocaleString('fr-FR') : v.toLocaleString('fr-FR');
  return String(v);
};
const escapeHtml = (s) => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const slug = (s) => String(s).toLowerCase();

function renderTable(rows) {
  if (!rows || !rows.length) return '<div class="muted">Aperçu indisponible.</div>';
  const head = rows[0] || [];
  const body = rows.slice(1);
  return `<div class="tblwrap"><table><thead><tr>${head.map(h=>`<th>${fmt(h)}</th>`).join('')}</tr></thead><tbody>${body.map(r=>`<tr>${head.map((_,i)=>`<td>${fmt(r[i])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function sideList() {
  const sc = byId('sideContent');
  if (state.view === 'activities') {
    sc.innerHTML = DATA.activities
      .filter(a => /^\d\d_/.test(a.file))
      .map(a => `<button class="navbtn jump" data-target="${a.file}">${a.title}</button>`).join('');
  } else if (state.view === 'macros') {
    sc.innerHTML = DATA.macros.map(m => `<button class="navbtn jump" data-target="${m.file}">${m.file}</button>`).join('');
  } else if (state.view === 'sources') {
    const srcs = DATA.activities.filter(a => a.file.includes('Filiale_') || a.file.startsWith('00_'));
    sc.innerHTML = srcs.map(a => `<button class="navbtn jump" data-target="${a.file}">${a.file}</button>`).join('');
  } else {
    const mainActs = DATA.activities.filter(a => /^\d\d_/.test(a.file));
    const sourceFiles = DATA.activities.filter(a => a.file.includes('Filiale_') || a.file.startsWith('00_'));
    sc.innerHTML = `
      <div class="card small">
        <div class="muted">Contenu du pack</div>
        <div class="chips">
          <span class="chip">${mainActs.length} activités</span>
          <span class="chip">${DATA.macros.length} macros VBA</span>
          <span class="chip">${sourceFiles.length} fichiers sources</span>
        </div>
      </div>
      <div class="card small">
        <div class="muted">Usage conseillé</div>
        <div style="margin-top:8px; line-height:1.5">1. Ouvrir un fichier Excel.<br>2. Lire les consignes.<br>3. Générer une macro avec l'IA.<br>4. Importer le module .bas.<br>5. Tester et améliorer.</div>
      </div>`;
  }
  sc.querySelectorAll('.jump').forEach(btn => btn.onclick = () => {
    const id = 'item-' + btn.dataset.target.replaceAll('.', '\\.');
    const el = document.querySelector(`[id="${'item-' + btn.dataset.target}"]`);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  });
}

function renderOverview() {
  const mainActs = DATA.activities.filter(a => /^\d\d_/.test(a.file));
  const sourceFiles = DATA.activities.filter(a => a.file.includes('Filiale_') || a.file.startsWith('00_'));
  return `
    <div class="kpis">
      <div class="kpi"><div class="muted">Activités</div><div class="n">${mainActs.length}</div></div>
      <div class="kpi"><div class="muted">Modules VBA</div><div class="n">${DATA.macros.length}</div></div>
      <div class="kpi"><div class="muted">Fichiers sources</div><div class="n">${sourceFiles.length}</div></div>
      <div class="kpi"><div class="muted">Supports</div><div class="n">2</div></div>
    </div>
    <div class="two">
      <div class="card">
        <h3 style="margin-top:0">Ce que contient le site</h3>
        <div class="muted">Toutes les données du pack ont été centralisées ici : consignes, prompts, extraits des feuilles Excel, liste des fichiers et code VBA complet.</div>
        <div class="chips">
          <span class="chip">Consolidation</span>
          <span class="chip">Anomalies</span>
          <span class="chip">Trésorerie</span>
          <span class="chip">Reporting</span>
          <span class="chip">Dépenses</span>
          <span class="chip">Dashboard</span>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-top:0">Parcours pédagogique suggéré</h3>
        <ol class="small" style="line-height:1.7; padding-left:18px">
          <li>Démarrer par les activités 1 à 4 pour les bases.</li>
          <li>Passer ensuite aux activités 5 à 8 pour l'analyse financière.</li>
          <li>Terminer par les activités 9 à 12 pour les usages avancés.</li>
          <li>Comparer ensuite les prompts IA, les macros générées et les macros du pack.</li>
        </ol>
      </div>
    </div>
    <div class="cards" style="margin-top:14px">
      ${mainActs.map(a => `
        <div class="card">
          <div class="muted small">${a.file}</div>
          <h3 style="margin:8px 0 10px">${a.title}</h3>
          <div class="small">${a.consignes['Objectif'] || ''}</div>
          <div class="chips">
            ${a.sheets.map(s => `<span class="chip">${s}</span>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

function renderActivities() {
  const q = slug(state.q);
  const items = DATA.activities.filter(a => /^\d\d_/.test(a.file)).filter(a => {
    const hay = slug(a.file + ' ' + a.title + ' ' + JSON.stringify(a.consignes));
    return !q || hay.includes(q);
  });
  return items.map(a => `
    <div class="card" id="item-${a.file}" style="margin-bottom:14px">
      <div class="muted small">${a.file}</div>
      <h2 style="margin:6px 0 10px">${a.title}</h2>
      <div class="cards">
        <div class="card">
          <div class="muted">Objectif</div>
          <div style="margin-top:6px">${a.consignes['Objectif'] || ''}</div>
        </div>
        <div class="card">
          <div class="muted">Livrable attendu</div>
          <div style="margin-top:6px">${a.consignes['Livrable attendu'] || ''}</div>
        </div>
      </div>
      <div class="card" style="margin-top:12px">
        <div class="muted">Prompt IA suggéré</div>
        <pre>${escapeHtml(a.consignes['Prompt IA suggéré'] || '—')}</pre>
      </div>
      ${a.previews.map(p => `
        <div class="card" style="margin-top:12px">
          <div class="muted">Aperçu feuille : ${p.sheet}</div>
          ${renderTable(p.rows)}
        </div>`).join('')}
    </div>`).join('');
}

function renderMacros() {
  const q = slug(state.q);
  const items = DATA.macros.filter(m => {
    const hay = slug(m.file + ' ' + m.module + ' ' + m.code);
    return !q || hay.includes(q);
  });
  return items.map(m => `
    <div class="card" id="item-${m.file}" style="margin-bottom:14px">
      <div class="muted small">${m.file}</div>
      <h2 style="margin:6px 0 10px">${m.module}</h2>
      <pre>${escapeHtml(m.code)}</pre>
    </div>`).join('');
}

function renderSources() {
  const q = slug(state.q);
  const items = DATA.activities.filter(a => a.file.includes('Filiale_') || a.file.startsWith('00_')).filter(a => {
    const hay = slug(a.file + ' ' + a.title + ' ' + JSON.stringify(a.previews));
    return !q || hay.includes(q);
  });
  return items.map(a => `
    <div class="card" id="item-${a.file}" style="margin-bottom:14px">
      <div class="muted small">${a.file}</div>
      <h2 style="margin:6px 0 10px">${a.title}</h2>
      ${a.previews.map(p => `
        <div class="card" style="margin-top:10px">
          <div class="muted">Aperçu feuille : ${p.sheet}</div>
          ${renderTable(p.rows)}
        </div>`).join('')}
    </div>`).join('');
}

function render() {
  document.querySelectorAll('.navbtn[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === state.view));
  sideList();
  let html = '';
  if (state.view === 'overview') html = renderOverview();
  else if (state.view === 'activities') html = renderActivities();
  else if (state.view === 'macros') html = renderMacros();
  else html = renderSources();
  byId('app').innerHTML = html || '<div class="muted">Aucun résultat.</div>';
}

document.querySelectorAll('.navbtn[data-view]').forEach(btn => btn.onclick = () => { state.view = btn.dataset.view; byId('typeFilter').value = state.view; render(); });
byId('search').addEventListener('input', e => { state.q = e.target.value; render(); });
byId('typeFilter').addEventListener('change', e => { state.view = e.target.value; render(); });
render();
</script>
</body>
</html>
